syntax = "proto3";

option csharp_namespace = "MundusVivens.Prototype.Protos";

package mundusvivens;

service MundusVivensGrpc {
  rpc TriggerDialogue (TriggerDialogueRequest) returns (TriggerDialogueResponse);
  rpc GetAgentStatus (GetAgentStatusRequest) returns (GetAgentStatusResponse);
  rpc InjectGossip (InjectGossipRequest) returns (InjectGossipResponse);
  rpc UpdateAgentStatus (UpdateAgentStatusRequest) returns (UpdateAgentStatusResponse);
  rpc ProcessWorldTick (ProcessWorldTickRequest) returns (ProcessWorldTickResponse);
}

message TriggerDialogueRequest {
  string agent_id_a = 1;
  string agent_id_b = 2;
  bool wait_for_completion = 3;
}

message TriggerDialogueResponse {
  string task_id = 1;
  bool is_queued = 2;
  bool completed_immediately = 3;
  string dialogue_summary = 4;
  repeated string dialogue_lines = 5;
}

message GetAgentStatusRequest {
  string agent_id = 1;
}

message GetAgentStatusResponse {
  string name = 1;
  string location = 2;
  string emotion = 3;
  string activity = 4;
  repeated string memories = 5;
}

message InjectGossipRequest {
  string subject_id = 1;
  string content = 2;
  string target_agent_id = 3;
}

message InjectGossipResponse {
  bool success = 1;
  string message = 2;
}

message UpdateAgentStatusRequest {
  string agent_id = 1;
  string location = 2;
  string emotion = 3;
  string activity = 4;
}

message UpdateAgentStatusResponse {
  bool success = 1;
  string message = 2;
}

message ProcessWorldTickRequest {
  int32 tick_number = 1;
}

message ProcessWorldTickResponse {
  bool success = 1;
  string message = 2;
}
